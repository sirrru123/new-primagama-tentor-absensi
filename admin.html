<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>
<body>

<!-- =========================
     LOGIN ADMIN
========================== -->

<div id="loginPage" class="login-page">

    <div class="login-card">

        <h1>ABSENSI TENTOR</h1>

        <h2>New Primagama Sunter Indah</h2>

        <div class="line"></div>

        <h3>LOGIN ADMIN</h3>

        <div class="input-group">

            <input
                type="password"
                id="adminPassword"
                placeholder="Masukkan Password"
            >

            <button
                id="togglePassword"
                type="button">

                👁

            </button>

        </div>

        <p
        id="loginError"
        class="login-error">

        </p>

        <button
        id="loginBtn"
        class="login-btn">

            MASUK ADMIN

        </button>

    </div>

</div>

<!-- =========================
     DASHBOARD
========================== -->

<div
class="container"
id="dashboard"
style="display:none;">

    <div class="header">

        <h1>ABSENSI TENTOR</h1>

        <h2>New Primagama Sunter Indah</h2>

    </div>

    <!-- Statistik -->

    <div class="stats">

        <div class="stat-card">

            <h3>Total Tentor</h3>

            <p id="totalTentor">0</p>

        </div>

        <div class="stat-card">

            <h3>Total Absensi</h3>

            <p id="totalAbsensi">0</p>

        </div>

    </div>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Cari nama tentor..."
        >

        <button id="downloadBtn">

            📥 Download Excel

        </button>

    </div>

    <!-- Tabel -->

    <div class="table-card">

        <table>

            <thead>

                <tr>

                    <th>Nama Tentor</th>
                    <th>Total Absen</th>
                    <th>History</th>
                    <th>Hapus Tentor</th>

                </tr>

            </thead>

            <tbody id="tentorTable">

                            </tbody>

        </table>

    </div>

</div>

<!-- =========================
     MODAL HISTORY
========================== -->

<div class="modal" id="historyModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">

                History Tentor

            </h2>

            <button id="closeModal">

                ✕

            </button>

        </div>

        <div id="historyContent">

        </div>

    </div>

</div>

<!-- =========================
     LIBRARY EXCEL
========================== -->

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- =========================
     ADMIN JS
========================== -->

<script type="module" src="js/admin.js"></script>

</body>
</html>
