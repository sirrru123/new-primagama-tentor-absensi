<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Admin</title>

<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="container">

    <div class="header">

        <h1>ABSENSI TENTOR</h1>
        <h2>New Primagama Sunter Indah</h2>

    </div>

    <!-- Statistik -->

    <div class="stats">

        <div class="stat-card">
            <h3>Total Tentor</h3>
            <p id="totalTentor">0</p>
        </div>

        <div class="stat-card">
            <h3>Total Absensi</h3>
            <p id="totalAbsensi">0</p>
        </div>

    </div>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Cari nama tentor..."
        >

        <button id="downloadBtn">
            Download Excel
        </button>

    </div>

    <!-- Tabel -->

    <div class="table-card">

        <table>

            <thead>

                <tr>

                    <th>Nama Tentor</th>
                    <th>Total Absen</th>
                    <th>History</th>
                    <th>Hapus Tentor</th>

                </tr>

            </thead>

            <tbody id="tentorTable">

            </tbody>

        </table>

    </div>

</div>

<!-- Modal History -->

<div class="modal" id="historyModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">
                History Tentor
            </h2>

            <button id="closeModal">
                ✕
            </button>

        </div>

        <div id="historyContent">

        </div>

    </div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
