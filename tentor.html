<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi Tentor</title>

<link rel="stylesheet" href="css/tentor.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>ABSENSI TENTOR</h1>
        <h2>New Primagama Sunter Indah</h2>

        <form id="absensiForm">

            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="tanggal" required>
            </div>

            <div class="form-group">
                <label>Nama Tentor</label>
                <input type="text" id="nama" required>
            </div>

            <div class="grid">

                <div class="form-group">
                    <label>Jam Tiba</label>
                    <input type="time" id="jamTiba" required>
                </div>

                <div class="form-group">
                    <label>Jadwal Mengajar</label>
                    <input type="time" id="jadwal" required>
                </div>

            </div>

            <div class="form-group">
                <label>Jam Selesai</label>
                <input type="time" id="jamSelesai" required>
            </div>

            <div class="form-group">
                <label>Jenjang</label>

                <select id="jenjang" required>
                    <option value="">Pilih Jenjang</option>
                    <option value="SD">SD</option>
                    <option value="SMP">SMP</option>
                    <option value="SMA">SMA</option>
                </select>
            </div>

            <div class="form-group">
                <label>Kelas</label>

                <select id="kelas" required>
                    <option value="">Pilih Kelas</option>
                </select>
            </div>

            <div class="form-group">
                <label>Mapel</label>
                <input type="text" id="mapel" required>
            </div>

            <div class="form-group">
                <label>Materi</label>
                <textarea id="materi" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Jenis Pembelajaran</label>

                <select id="jenis" required>
                    <option value="">Pilih Jenis</option>
                    <option value="REG">REG</option>
                    <option value="KNS">KNS</option>
                    <option value="PRVT">PRVT</option>
                    <option value="PM">PM</option>
                </select>
            </div>

            <div class="form-group">
                <label>Kendala Selama Mengajar</label>
                <textarea id="kendala" rows="4"></textarea>
            </div>

            <button type="submit">
                Simpan Absensi
            </button>

        </form>

    </div>

</div>

<script type="module" src="js/tentor.js"></script>
</body>
</html>
